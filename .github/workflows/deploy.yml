name: Đẩy code lên hosting tenten

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2' # Thay bằng phiên bản PHP của bạn

      - name: Install Composer Dependencies
        run: composer install --optimize-autoloader --no-dev --no-interaction

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install NPM & Build Vue/Inertia Assets
        run: |
          npm install
          npm run build
          rm -f public/hot  # Xóa file hot để production không bị kéo về Vite dev server
          rm -rf node_modules # Xóa node_modules đi cho nhẹ, server không cần cái này

      # BƯỚC ĐỘT PHÁ: Nén toàn bộ code thành 1 file ZIP duy nhất và tạo file giải nén tự động
     # BƯỚC 1: TÁCH BIỆT FILE ZIP VÀ FILE GIẢI NÉN (Bổ sung chmod 644)
      - name: Prepare Zip and Extract Script
        run: |
          mkdir -p deploy_dist/public
          
          # Nén toàn bộ project thành file archive.zip nằm ở thư mục gốc deploy_dist
          zip -q -r deploy_dist/archive.zip . -x "*.git*" "tests/*" ".env.example" "deploy_dist/*"
          
          # Tạo file giải nén unzip.php nằm ĐÚNG trong thư mục public/
          cat << 'EOF' > deploy_dist/public/unzip.php
          <?php
          // Vì file này nằm trong public/, ta cần nhảy ra thư mục cha (..) để giải nén file archive.zip
          $targetDir = dirname(__DIR__); 
          $zipFile = $targetDir . '/archive.zip';

          $zip = new ZipArchive;
          if ($zip->open($zipFile) === TRUE) {
              $zip->extractTo($targetDir);
              $zip->close();
              unlink($zipFile);     // Giải nén xong tự xóa file zip gốc ở thư mục cha
              unlink(__FILE__);      // Tự sát để bảo mật
              echo "Deploy & Unzip Success!";
          } else {
              http_response_code(500);
              echo "Unzip Failed! File zip khoong ton tai hoac bi loi.";
          }
          ?>
          EOF

          # QUAN TRỌNG: Ép quyền file về 644 để Shared Hosting Tenten cho phép thực thi qua URL công cộng
          chmod 644 deploy_dist/public/unzip.php

      # BƯỚC 2: ĐẨY LÊN SERVER (Giữ nguyên bước FTP của bạn)
      - name: Deploy to Tenten via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./deploy_dist/
          server-dir: /hainam.id.vn/

      # BƯỚC 3: KÍCH HOẠT LỆNH GIẢI NÉN TỪ XA (Sửa lại cấu hình curl an toàn)
      - name: Extract on Server
        run: |
          echo "Dang kích hoat giai nén..."
          # Thêm cờ -v để nếu lỗi, curl sẽ in toàn bộ chi tiết Header phản hồi (403 hay 500) ra log để debug
          curl -v -k -s -f https://hainam.id.vn/unzip.php